<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Field</title>
    <link rel="icon" href="textures/favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">   
</head>
<body>
    <div class="info">
        <h1 class="name"> Gray Difference</h1>
    </div>
    <div class="game"> 
        <div class="hp"> 
            <div class="heart" id="heart1" ></div>
            <div class="heart" id="heart2" ></div>
            <div class="heart" id="heart3" ></div>
            <div class="hitPoints">
                <p><span id="currentHP">3</span>/<span id="maxHP">3</span></p>
            </div>
        </div>
        
         <div class="skills">
            <button class="skill" id="skill1" title="Bear Trap">
                <p class="skill-key">Q</p>
            </button>
            <button class="skill" id="skill3" title="FireBall">
                <p class="skill-key">E</p>
            </button>
            <button class="skill" id="skill4" title="Heal">
                <p class="skill-key">R</p>
            </button>
         </div>
        

        <button class="game-button" id="startButton">Start Game</button>
    </div>

    <script src="./scripts/tower.js" ></script>
    <script src="./scripts/enemy.js" ></script>
    <script src="./scripts/trap.js" ></script>
    <script src="./scripts/fireball.js" ></script>
    <script src="./scripts/init.js" ></script>
    <script src="start.js" ></script>
</body>
</html>
