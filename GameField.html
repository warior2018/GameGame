<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Field</title>
    <link rel="icon" href="textures/favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">   
</head>
<body>
    <div class="info">
        <h1 class="name"> Gray Difference</h1>
    </div>
    <div class="game"> 
        <div class="hp"> 
            <img class="heart" id="heart1" src="textures/heart.png" alt="Heart Icon1">
            <img class="heart" id="heart2" src="textures/heart.png" alt="Heart Icon2">
            <img class="heart" id="heart3" src="textures/heart.png" alt="Heart Icon3">
            <div class="hitPoints">
                <p><span id="currentHP">3</span>/<span id="maxHP">3</span></p>
            </div>
        </div>
        
         <div class="skills">
            <button class="skill" id="skill1" title="Bear Trap">
                <p id="skill1-state"></p>
                <p id="skill1-manacost"></p>
            </button>

            <button class="skill" id="skill2" title="Blow enemies away">
                <p id="skill2-state"></p>
                <p id="skill2-manacost"></p>
            </button>

            <button class="skill" id="skill3" title="FireBall">
                <p id="skill3-state"></p>
                <p id="skill3-manacost"></p>
            </button>

            <button class="skill" id="skill4" title="Heal">
                <p id="skill4-state"></p>
                <p id="skill4-manacost"></p>
            </button>
         </div>
        



        <button class="game-button" id="startButton">Start Game</button>
    </div>

    <script src="start.js" type="module"></script>
</body>
</html>
